# Redis Configuration
# https://redis.io/docs/management/config/

# Bind to all interfaces (Docker network)
bind 0.0.0.0

# Default port
port 6379

# Password protection (uncomment for production)
# requirepass changeme_in_production

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence — RDB snapshots
save 900 1
save 300 10
save 60 10000

# AOF persistence (more durable)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Logging
loglevel notice
