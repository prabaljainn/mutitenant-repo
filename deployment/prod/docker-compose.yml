# Production-flavour stack for a single VPS.
#
# What it runs:
#   - platform     — the Spring Boot app, image pulled from GHCR
#   - mongodb      — MongoDB 8.0 LTS, single-node replica set rs0, auth ON
#   - redis        — refresh tokens + rate-limit buckets, password-auth ON
#   - traefik      — TLS termination + automatic Let's Encrypt for the
#                    public hostname, routes ${PLATFORM_HOST} → platform:8080
#
# Designed for a single VPS POC. For real scale you'd replace mongodb
# with a managed service (Atlas, DocDB) and run traefik on the host or
# behind a load balancer. The compose shape doesn't change.
#
# Bring up:
#   cd deployment/prod
#   cp .env.example .env       # then edit
#   ../../scripts/gen-jwt-keys.sh
#   docker compose pull
#   docker compose up -d
#
# Logs:    docker compose logs -f platform
# Health:  curl -fsS https://${PLATFORM_HOST}/actuator/health

name: orochiverse-prod

services:
  # ─────────────────────────────────────────────────────────────────────
  # Platform — pulled from GHCR. The tag is parameterised via .env so a
  # rolling update is `PLATFORM_IMAGE_TAG=sha-abc1234 docker compose up
  # -d platform`.
  # ─────────────────────────────────────────────────────────────────────
  platform:
    image: ${PLATFORM_IMAGE}:${PLATFORM_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Mongo URI carries the credentials inline — no separate user/pass
      # env vars to drift.
      MONGODB_URI: mongodb://${MONGO_APP_USERNAME}:${MONGO_APP_PASSWORD}@mongodb:27017/iam_db?replicaSet=rs0&authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      # JWT keys are mounted as a read-only secret volume (below).
      PLATFORM_JWT_ISSUER: https://${PLATFORM_HOST}
      PLATFORM_JWT_PRIVATE_KEY_PATH: /run/secrets/jwt/jwt-private.pem
      PLATFORM_JWT_PUBLIC_KEY_PATH:  /run/secrets/jwt/jwt-public.pem
      PLATFORM_JWT_KEY_ID: ${PLATFORM_JWT_KEY_ID}
      PLATFORM_EMAIL_FROM: ${PLATFORM_EMAIL_FROM}
      PLATFORM_EMAIL_REPLY_TO: ${PLATFORM_EMAIL_REPLY_TO}
      PLATFORM_EMAIL_BASE_URL: https://${PLATFORM_HOST}
      # First-boot bootstrap operator. The runner only seeds when no
      # operator exists, so leaving these set indefinitely is safe.
      PLATFORM_BOOTSTRAP_OPERATOR_EMAIL: ${BOOTSTRAP_OPERATOR_EMAIL}
      PLATFORM_BOOTSTRAP_OPERATOR_PASSWORD: ${BOOTSTRAP_OPERATOR_PASSWORD}
      # Tighten the JVM for the container memory limit set below.
      JAVA_OPTS: "-XX:MaxRAMPercentage=75 -XX:+UseZGC -XX:+ZGenerational"
    volumes:
      - ./secrets/jwt:/run/secrets/jwt:ro
    networks: [edge, internal]
    deploy:
      resources:
        limits:
          memory: 1024M
    labels:
      # Traefik routing — see traefik/dynamic for the static config.
      - traefik.enable=true
      - traefik.http.routers.platform.rule=Host(`${PLATFORM_HOST}`)
      - traefik.http.routers.platform.entrypoints=websecure
      - traefik.http.routers.platform.tls.certresolver=le
      - traefik.http.services.platform.loadbalancer.server.port=8080
      - traefik.http.services.platform.loadbalancer.healthcheck.path=/actuator/health
      - traefik.http.services.platform.loadbalancer.healthcheck.interval=30s

  # ─────────────────────────────────────────────────────────────────────
  # MongoDB 8.0 LTS, rs0, auth enabled. The init container creates the
  # app user with the minimum privileges Spring Data + Mongock need:
  # readWrite on iam_db and any tenant_*_db (so the provisioner can
  # create per-tenant databases on demand).
  # ─────────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:8.0
    restart: unless-stopped
    command:
      - mongod
      - --replSet=rs0
      - --bind_ip_all
      - --keyFile=/etc/mongo/keyfile
      - --auth
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./secrets/mongo/keyfile:/etc/mongo/keyfile:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "-u", "${MONGO_ROOT_USERNAME}", "-p", "${MONGO_ROOT_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks: [internal]

  mongo-init:
    image: mongo:8.0
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    environment:
      MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
    entrypoint:
      - bash
      - -c
      - |
        set -e
        mongosh --quiet --host mongodb:27017 -u "$$MONGO_ROOT_USERNAME" -p "$$MONGO_ROOT_PASSWORD" --authenticationDatabase admin --eval '
          try {
            const s = rs.status();
            print("rs0 already initialised, state=" + s.myState);
          } catch (e) {
            if (e.codeName === "NotYetInitialized") {
              rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "mongodb:27017", priority: 1 }] });
              while (!db.hello().isWritablePrimary) { sleep(500); }
            } else { throw e; }
          }
        '
        mongosh --quiet --host mongodb:27017 -u "$$MONGO_ROOT_USERNAME" -p "$$MONGO_ROOT_PASSWORD" --authenticationDatabase admin --eval "
          if (db.getSiblingDB('admin').getUser('$$MONGO_APP_USERNAME') === null) {
            db.getSiblingDB('admin').createUser({
              user: '$$MONGO_APP_USERNAME',
              pwd:  '$$MONGO_APP_PASSWORD',
              roles: [
                { role: 'readWrite', db: 'iam_db' },
                { role: 'readWriteAnyDatabase', db: 'admin' }
              ]
            });
            print('Created app user');
          } else {
            print('App user already exists');
          }
        "
    networks: [internal]

  # ─────────────────────────────────────────────────────────────────────
  # Redis with password auth. Not exposed to the host — only reachable
  # inside the `internal` network.
  # ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --save
      - "60"
      - "1"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  # ─────────────────────────────────────────────────────────────────────
  # Traefik — TLS-terminating reverse proxy with automatic Let's Encrypt
  # certificate provisioning. The platform never sees plain HTTP from
  # the public internet.
  # ─────────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=orochiverse-prod_edge
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.le.acme.storage=/acme/acme.json
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --accesslog=true
      - --log.level=INFO
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/acme
    networks: [edge]

volumes:
  mongodb_data:
  mongodb_config:
  redis_data:
  traefik_acme:

networks:
  # Public-facing — traefik + platform are on this network so traefik
  # can route in.
  edge:
    driver: bridge
  # Private — mongo + redis + platform only. Nothing in here is
  # reachable from outside the host.
  internal:
    driver: bridge
    internal: true
