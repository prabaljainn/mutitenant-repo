# Production-flavour stack for a single VPS.
#
# What it runs:
#   - platform     — the Spring Boot app, image pulled from GHCR
#   - mongodb      — MongoDB 8.0 LTS, single-node replica set rs0, auth ON
#   - redis        — refresh tokens + rate-limit buckets, password-auth ON
#   - traefik      — TLS termination + automatic Let's Encrypt for the
#                    public hostname, routes ${PLATFORM_HOST} → platform:8080
#
# Designed for a single VPS POC. For real scale you'd replace mongodb
# with a managed service (Atlas, DocDB) and run traefik on the host or
# behind a load balancer. The compose shape doesn't change.
#
# Bring up:
#   cd deployment/prod
#   cp .env.example .env       # then edit
#   docker compose pull
#   docker compose up -d
#
# Both the Mongo rs0 internal-auth keyfile and the JWT signing keypair
# are generated automatically on first boot by one-shot init services
# (`mongo-keyfile-init`, `jwt-keys-init`) into docker-managed named
# volumes — no pre-step, no host bind-mounts. The volumes persist
# across `down/up`, so keys are stable; only `down -v` rotates them.
#
# Logs:    docker compose logs -f platform
# Health:  curl -fsS https://${PLATFORM_HOST}/actuator/health

name: orochiverse-prod

services:
  # ─────────────────────────────────────────────────────────────────────
  # Platform — pulled from GHCR. The tag is parameterised via .env so a
  # rolling update is `PLATFORM_IMAGE_TAG=sha-abc1234 docker compose up
  # -d platform`.
  # ─────────────────────────────────────────────────────────────────────
  platform:
    image: ${PLATFORM_IMAGE}:${PLATFORM_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      jwt-keys-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Mongo URI carries the credentials inline — no separate user/pass
      # env vars to drift.
      MONGODB_URI: mongodb://${MONGO_APP_USERNAME}:${MONGO_APP_PASSWORD}@mongodb:27017/iam_db?replicaSet=rs0&authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # Mail health check disabled while SMTP creds are placeholder —
      # keeps aggregate /actuator/health UP so the Docker HEALTHCHECK
      # passes and Traefik routes to the container. Remove once real
      # SMTP_USERNAME/SMTP_PASSWORD are set in .env.
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      # JWT keys are mounted as a read-only secret volume (below).
      PLATFORM_JWT_ISSUER: https://${PLATFORM_HOST}
      PLATFORM_JWT_PRIVATE_KEY_PATH: /run/secrets/jwt/jwt-private.pem
      PLATFORM_JWT_PUBLIC_KEY_PATH:  /run/secrets/jwt/jwt-public.pem
      PLATFORM_JWT_KEY_ID: ${PLATFORM_JWT_KEY_ID}
      PLATFORM_EMAIL_FROM: ${PLATFORM_EMAIL_FROM}
      PLATFORM_EMAIL_REPLY_TO: ${PLATFORM_EMAIL_REPLY_TO}
      PLATFORM_EMAIL_BASE_URL: https://${PLATFORM_HOST}
      # First-boot bootstrap operator. The runner only seeds when no
      # operator exists, so leaving these set indefinitely is safe.
      PLATFORM_BOOTSTRAP_OPERATOR_EMAIL: ${BOOTSTRAP_OPERATOR_EMAIL}
      PLATFORM_BOOTSTRAP_OPERATOR_PASSWORD: ${BOOTSTRAP_OPERATOR_PASSWORD}
      # Tighten the JVM for the container memory limit set below.
      JAVA_OPTS: "-XX:MaxRAMPercentage=75 -XX:+UseZGC -XX:+ZGenerational"
    volumes:
      # JWT keypair is materialised by `jwt-keys-init` into the
      # `jwt_keys` named volume on first boot — no host bind-mount, no
      # manual `gen-jwt-keys.sh` step needed.
      - jwt_keys:/run/secrets/jwt:ro
    networks: [edge, internal]
    deploy:
      resources:
        limits:
          memory: 1024M
    labels:
      # Traefik routing — see traefik/dynamic for the static config.
      - traefik.enable=true
      - traefik.http.routers.platform.rule=Host(`${PLATFORM_HOST}`)
      - traefik.http.routers.platform.entrypoints=websecure
      - traefik.http.routers.platform.tls.certresolver=le
      - traefik.http.services.platform.loadbalancer.server.port=8080
      - traefik.http.services.platform.loadbalancer.healthcheck.path=/actuator/health
      - traefik.http.services.platform.loadbalancer.healthcheck.interval=30s

  # ─────────────────────────────────────────────────────────────────────
  # JWT keypair bootstrap — one-shot init that materialises the RSA-2048
  # signing keypair the platform consumes at /run/secrets/jwt/. The
  # private key is PKCS#8 ("PRIVATE KEY"), the public is X.509
  # SubjectPublicKeyInfo ("PUBLIC KEY") — same shapes that
  # FileRsaKeyProvider parses.
  #
  # The `kid` is the operator-chosen value in PLATFORM_JWT_KEY_ID (.env)
  # — the init service writes it into kid.txt for reference and the
  # platform reads the same env var directly, so both sides agree.
  # Idempotent: existing keys are preserved across `down/up`; only `down
  # -v` (volume wipe) rotates them.
  #
  # Mode 444 is fine inside the read-only volume mount — the platform
  # container is the only consumer of the volume.
  # ─────────────────────────────────────────────────────────────────────
  jwt-keys-init:
    image: mongo:8.0
    user: "0:0"
    restart: "no"
    volumes:
      - jwt_keys:/keys
    environment:
      PLATFORM_JWT_KEY_ID: ${PLATFORM_JWT_KEY_ID}
    entrypoint:
      - bash
      - -c
      - |
        set -euo pipefail
        if [ -z "$${PLATFORM_JWT_KEY_ID:-}" ]; then
          echo "[jwt-keys-init] ERROR: PLATFORM_JWT_KEY_ID must be set in .env (any stable identifier — e.g. prod-key-001)" >&2
          exit 1
        fi
        cd /keys
        if [ ! -s jwt-private.pem ] || [ ! -s jwt-public.pem ]; then
          echo "[jwt-keys-init] Generating new RSA-2048 keypair"
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out jwt-private.pem 2>/dev/null
          openssl pkey -in jwt-private.pem -pubout -out jwt-public.pem
          echo "[jwt-keys-init] Wrote jwt-private.pem ($$(wc -c < jwt-private.pem) bytes), jwt-public.pem ($$(wc -c < jwt-public.pem) bytes)"
        else
          echo "[jwt-keys-init] Keypair already present; preserving content"
        fi
        # kid.txt always tracks the current env var (operator-chosen).
        printf '%s' "$$PLATFORM_JWT_KEY_ID" > kid.txt
        chmod 444 jwt-private.pem jwt-public.pem kid.txt
        echo "[jwt-keys-init] Ready (kid=$$PLATFORM_JWT_KEY_ID)"
    networks: [internal]

  # ─────────────────────────────────────────────────────────────────────
  # Mongo keyfile bootstrap — one-shot init that materialises the rs0
  # internal-auth keyfile inside a docker-managed volume so the stack is
  # self-bootstrapping from a clean checkout. Idempotent: if the volume
  # already contains a keyfile, the content is left alone and only the
  # owner/mode are re-asserted. Runs as root so it can chown the file to
  # mongod's in-container uid (999).
  # ─────────────────────────────────────────────────────────────────────
  mongo-keyfile-init:
    image: mongo:8.0
    user: "0:0"
    restart: "no"
    volumes:
      - mongodb_keyfile:/keyfile
    entrypoint:
      - bash
      - -c
      - |
        set -euo pipefail
        KEYFILE=/keyfile/keyfile
        if [ ! -s "$$KEYFILE" ]; then
          echo "[mongo-keyfile-init] Generating new rs0 keyfile"
          openssl rand -base64 756 > "$$KEYFILE"
          echo "[mongo-keyfile-init] Wrote $$(wc -c < "$$KEYFILE") bytes"
        else
          echo "[mongo-keyfile-init] Keyfile already present; preserving content"
        fi
        chmod 400 "$$KEYFILE"
        chown 999:999 "$$KEYFILE"
        echo "[mongo-keyfile-init] Ready ($$(stat -c '%a %u:%g' "$$KEYFILE"))"
    networks: [internal]

  # ─────────────────────────────────────────────────────────────────────
  # MongoDB 8.0 LTS, rs0, auth enabled. The init container creates the
  # app user with the minimum privileges Spring Data + Mongock need:
  # readWrite on iam_db and any tenant_*_db (so the provisioner can
  # create per-tenant databases on demand).
  #
  # The rs0 internal-auth keyfile is materialised by `mongo-keyfile-init`
  # into the `mongodb_keyfile` named volume and mounted read-only here at
  # /etc/mongo so the file lives at /etc/mongo/keyfile. The volume
  # persists across `docker compose down/up`, so the keyfile is stable
  # and the replica set stays valid.
  # ─────────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:8.0
    restart: unless-stopped
    depends_on:
      mongo-keyfile-init:
        condition: service_completed_successfully
    command:
      - mongod
      - --replSet=rs0
      - --bind_ip_all
      - --keyFile=/etc/mongo/keyfile
      - --auth
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - mongodb_keyfile:/etc/mongo:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "-u", "${MONGO_ROOT_USERNAME}", "-p", "${MONGO_ROOT_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks: [internal]

  mongo-init:
    image: mongo:8.0
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    environment:
      MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
    entrypoint:
      - bash
      - -c
      - |
        set -e
        mongosh --quiet --host mongodb:27017 -u "$$MONGO_ROOT_USERNAME" -p "$$MONGO_ROOT_PASSWORD" --authenticationDatabase admin --eval '
          try {
            const s = rs.status();
            print("rs0 already initialised, state=" + s.myState);
          } catch (e) {
            if (e.codeName === "NotYetInitialized") {
              rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "mongodb:27017", priority: 1 }] });
              while (!db.hello().isWritablePrimary) { sleep(500); }
            } else { throw e; }
          }
        '
        mongosh --quiet --host mongodb:27017 -u "$$MONGO_ROOT_USERNAME" -p "$$MONGO_ROOT_PASSWORD" --authenticationDatabase admin --eval "
          if (db.getSiblingDB('admin').getUser('$$MONGO_APP_USERNAME') === null) {
            db.getSiblingDB('admin').createUser({
              user: '$$MONGO_APP_USERNAME',
              pwd:  '$$MONGO_APP_PASSWORD',
              roles: [
                { role: 'readWrite', db: 'iam_db' },
                { role: 'readWriteAnyDatabase', db: 'admin' }
              ]
            });
            print('Created app user');
          } else {
            print('App user already exists');
          }
        "
    networks: [internal]

  # ─────────────────────────────────────────────────────────────────────
  # Redis with password auth. Not exposed to the host — only reachable
  # inside the `internal` network.
  # ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --save
      - "60"
      - "1"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  # ─────────────────────────────────────────────────────────────────────
  # Traefik — TLS-terminating reverse proxy with automatic Let's Encrypt
  # certificate provisioning. The platform never sees plain HTTP from
  # the public internet.
  # ─────────────────────────────────────────────────────────────────────
  traefik:
    # v3.2+ ships an updated docker client SDK that negotiates correctly
    # against Engine 25+ (which sets MinAPIVersion=1.40). v3.1 hardcoded
    # an API-1.24 fallback that the modern daemon rejects with "client
    # version 1.24 is too old", and no env-var override is honored by
    # the older SDK — bumping the image is the only working fix.
    image: traefik:v3.7
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Belt-and-suspenders: pin the API version the docker client uses,
      # in case a future v3.x ever regresses on negotiation. 1.43 is
      # Docker 24.0's API and sits inside every modern Engine's range.
      DOCKER_API_VERSION: "1.43"
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=orochiverse-prod_edge
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.le.acme.storage=/acme/acme.json
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --accesslog=true
      - --log.level=INFO
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/acme
    networks: [edge]

volumes:
  mongodb_data:
  mongodb_config:
  mongodb_keyfile:
  jwt_keys:
  redis_data:
  traefik_acme:

networks:
  # Public-facing — traefik + platform are on this network so traefik
  # can route in.
  edge:
    driver: bridge
  # Private — mongo + redis + platform only. Nothing in here is
  # reachable from outside the host.
  internal:
    driver: bridge
    internal: true
