# Traefik Dynamic Configuration — Routing & Middlewares
# This file is watched and auto-reloaded by Traefik

http:
  # ─────────────────────────────────────────────
  # Routers
  # ─────────────────────────────────────────────
  routers:
    # Admin Dashboard — admin.domain.com or domain.com/admin
    admin-router:
      rule: "Host(`admin.domain.com`) || PathPrefix(`/admin`)"
      service: platform-service
      entryPoints:
        - web
      middlewares:
        - admin-headers

    # Platform API — domain.com/api
    api-router:
      rule: "PathPrefix(`/api`)"
      service: platform-service
      entryPoints:
        - web
      middlewares:
        - api-ratelimit
        - api-headers

  # ─────────────────────────────────────────────
  # Services
  # ─────────────────────────────────────────────
  services:
    platform-service:
      loadBalancer:
        servers:
          - url: "http://platform:8080"

  # ─────────────────────────────────────────────
  # Middlewares
  # ─────────────────────────────────────────────
  middlewares:
    # Rate limiting for API endpoints
    api-ratelimit:
      rateLimit:
        average: 100
        burst: 50
        period: 1m

    # Security headers for admin
    admin-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow"

    # Security headers for API
    api-headers:
      headers:
        contentTypeNosniff: true
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
