name: release

# Builds and pushes the platform container image to the GitHub Container
# Registry (GHCR). Two triggers:
#
#   1. push to main          → tags: latest, main, sha-<short>
#   2. push of a v* tag      → tags: v1.2.3, 1.2, 1, plus the above
#
# We deliberately do not push on every PR — the `build.yml` workflow
# proves the code compiles + tests pass; we only mint images for things
# that have actually landed on a branch we care about.
#
# Multi-arch (linux/amd64 + linux/arm64) so the same tag works on
# typical x86 servers AND on Apple Silicon / Graviton hosts without a
# separate build.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # never cancel a publish — it's idempotent but interrupting mid-push pollutes the registry

permissions:
  contents: read
  packages: write   # required for `docker push ghcr.io/...`

env:
  REGISTRY: ghcr.io
  # Lowercased at compute-time below — GHCR rejects mixed-case repo
  # names but GITHUB_REPOSITORY preserves whatever the user typed.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  image:
    name: build + push image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: lowercase image name
        # GHCR is strict about case. github.repository is "Owner/Repo"
        # verbatim; we need "owner/repo".
        id: img
        run: echo "name=${IMAGE_NAME,,}/platform" >> "$GITHUB_OUTPUT"

      - name: set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=orochiverse-platform
            org.opencontainers.image.description=Orochiverse multi-tenant platform backend
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Proprietary

      - name: build + push
        uses: docker/build-push-action@v5
        with:
          context: ./platform
          file: ./platform/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Buildx layer cache via GHA — saves the 5-minute Maven
          # dependency download on subsequent builds. Cache misses
          # happen when pom.xml changes; that's expected.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: publish image summary
        run: |
          {
            echo "### Published image"
            echo ""
            echo "**Tags:**"
            echo "${{ steps.meta.outputs.tags }}" | sed 's/^/- `/' | sed 's/$/`/'
            echo ""
            echo "**Platforms:** linux/amd64, linux/arm64"
            echo ""
            echo "**Pull:**"
            echo '```'
            echo "docker pull ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
