name: build

# CI for the platform module. Triggered on every push to main and on
# every PR. Failing the workflow blocks merge.
#
# What runs:
#   - Surefire unit tests + Failsafe ITs that don't need Mongo (the
#     Mongo-backed ITs use @EnabledIf("MongoTestSupport#mongoIsReachable")
#     and skip themselves on the GitHub runner since no dev stack is up).
#   - ArchUnit boundary checks (PackageBoundaryTest, RepositoryDisciplineTest).
#
# What does NOT run here yet:
#   - Mongo-backed ITs (AuthApiIT, TenantSelfApiIT, …). These need the
#     dev replica-set + MailHog and are exercised locally via
#     `./scripts/dev-up.sh && ./mvnw verify`. Adding them to CI is a
#     follow-up — likely as a service-containers job once the matrix is
#     stable.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight run on the same ref when a new commit arrives —
# the latest commit's result is the only one that matters for review.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build + test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: platform

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: mvnw verify
        run: ./mvnw -B -ntp verify
        env:
          # Keep the test runs deterministic — match the dev profile defaults.
          SPRING_PROFILES_ACTIVE: test

      - name: upload surefire + failsafe reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            platform/target/surefire-reports/
            platform/target/failsafe-reports/
          if-no-files-found: ignore
          retention-days: 7
