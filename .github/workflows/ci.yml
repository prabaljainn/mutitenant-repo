name: ci

# Single CI pipeline for the whole repo. Replaces the four-workflow
# split (build / release / admin-frontend-ci / frontend-release) that
# was effectively doing two things — test, then conditionally publish.
#
# Layout:
#   ┌─ platform-test ─────────────┐
#   │  ./mvnw -B -ntp verify      │──► platform-image (push: main / v* tag)
#   └─────────────────────────────┘
#   ┌─ frontend-check ────────────┐
#   │  tsc + lint + next build    │──► frontend-image (push: main)
#   └─────────────────────────────┘
#
# Both test/check jobs run on every PR and every push. The image jobs
# only run when the ref is main or a v* tag — never on PRs. That keeps
# release-gating logic in one place and turns the registry tags into
# a direct consequence of "tests passed against this ref."
#
# Manual re-publish: workflow_dispatch on main (or a tagged ref via
# "Use workflow from") will re-run tests and re-publish. For test-less,
# branch-pinned ad-hoc builds, use quick-push.yml instead.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # required so the image jobs can push to GHCR

concurrency:
  # Cancel superseded PR builds (only the latest commit matters for
  # review). NEVER cancel a main / tag publish — interrupting a docker
  # push mid-layer pollutes the registry. The job-level concurrency
  # on the image jobs further protects those from being cancelled even
  # if this top-level group ever does.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  # Lowercased per-job — GHCR rejects mixed-case repo names but
  # GITHUB_REPOSITORY preserves whatever the user typed.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ───────────────────────────────────────────────────────────────
  # Platform — Surefire + Failsafe (Mongo-free ITs only on CI) +
  # ArchUnit boundary checks.
  # ───────────────────────────────────────────────────────────────
  platform-test:
    name: platform — test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: platform
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: mvnw verify
        run: ./mvnw -B -ntp verify
        env:
          # Mongo-backed ITs are gated by
          # @EnabledIf("MongoTestSupport#mongoIsReachable") and skip
          # themselves on the runner. The test profile mirrors the
          # local dev defaults so behaviour is deterministic.
          SPRING_PROFILES_ACTIVE: test

      - name: upload surefire + failsafe reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-failsafe-reports
          path: |
            platform/target/surefire-reports/
            platform/target/failsafe-reports/
          if-no-files-found: ignore
          retention-days: 7

  # ───────────────────────────────────────────────────────────────
  # Admin frontend — typecheck + lint + next build.
  # ───────────────────────────────────────────────────────────────
  frontend-check:
    name: admin-frontend — typecheck + lint + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend/admin
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/admin/package-lock.json

      - name: install
        run: npm ci --no-audit --no-fund

      - name: typecheck
        run: npm run typecheck

      - name: lint
        run: npm run lint -- --max-warnings 0

      - name: build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: upload .next on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: admin-frontend-next-output
          path: frontend/admin/.next/
          retention-days: 5
          if-no-files-found: ignore

  # ───────────────────────────────────────────────────────────────
  # Platform image — gated on tests + ref. Publishes only when the
  # ref is main or a v* tag; never on PRs.
  # ───────────────────────────────────────────────────────────────
  platform-image:
    name: platform — build + push image
    needs: platform-test
    if: |
      github.event_name != 'pull_request' && (
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/v')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      # Per-image group so frontend / platform publishes don't cancel
      # each other. cancel-in-progress=false because interrupting a
      # docker push mid-upload pollutes the registry.
      group: ci-platform-image-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}/platform" >> "$GITHUB_OUTPUT"

      - name: set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: compute tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=orochiverse-platform
            org.opencontainers.image.description=Orochiverse multi-tenant platform backend
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Proprietary

      - name: build + push
        uses: docker/build-push-action@v7
        with:
          context: ./platform
          file: ./platform/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scoped buildx cache so platform / admin-frontend don't
          # trample each other's layers in GHA cache storage.
          cache-from: type=gha,scope=platform
          cache-to: type=gha,scope=platform,mode=max

      - name: publish image summary
        run: |
          {
            echo "### Published platform image"
            echo ""
            echo "**Tags:**"
            echo "${{ steps.meta.outputs.tags }}" | sed 's/^/- `/' | sed 's/$/`/'
            echo ""
            echo "**Platforms:** linux/amd64"
            echo ""
            echo "**Pull:**"
            echo '```'
            echo "docker pull ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────
  # Admin frontend image — gated on the check job + ref==main.
  # No semver tagging here; the frontend isn't versioned independently
  # of the backend — we chase a known-good sha against the deployed
  # platform.
  # ───────────────────────────────────────────────────────────────
  frontend-image:
    name: admin-frontend — build + push image
    needs: frontend-check
    if: |
      github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: ci-frontend-image-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}/admin-frontend" >> "$GITHUB_OUTPUT"

      - name: set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: compute tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=orochiverse-admin-frontend
            org.opencontainers.image.description=Operator admin console (Next.js standalone)
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Proprietary

      - name: build + push
        uses: docker/build-push-action@v7
        with:
          context: ./frontend/admin
          file: ./frontend/admin/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=admin-frontend
          cache-to: type=gha,scope=admin-frontend,mode=max

      - name: publish image summary
        run: |
          {
            echo "### Published admin-frontend image"
            echo ""
            echo "**Tags:**"
            echo "${{ steps.meta.outputs.tags }}" | sed 's/^/- `/' | sed 's/$/`/'
            echo ""
            echo "**Pull:**"
            echo '```'
            echo "docker pull ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
