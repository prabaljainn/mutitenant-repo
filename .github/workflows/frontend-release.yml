name: frontend-release

# Builds and pushes the admin-frontend container image to GHCR.
# Mirrors release.yml (which does the same for the platform image) so
# the deploy operator has the same mental model for both images.
#
# Triggers:
#   1. push to main, frontend paths only → tags: latest, main, sha-<short>
#   2. workflow_dispatch                  → manual, any branch → sha-<short>
#                                           (branch dispatches do NOT update
#                                            :latest — gated to main)
#
# No semver tagging here — the frontend isn't versioned independently
# of the backend; we chase a known-good sha against the deployed platform.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/admin/**'
      - '.github/workflows/frontend-release.yml'
  workflow_dispatch:

concurrency:
  group: frontend-release-${{ github.ref }}
  cancel-in-progress: false  # idempotent push but interrupting pollutes the registry

permissions:
  contents: read
  packages: write   # required for docker push ghcr.io/...

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  image:
    name: build + push image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}/admin-frontend" >> "$GITHUB_OUTPUT"

      - name: set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: compute tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=orochiverse-admin-frontend
            org.opencontainers.image.description=Operator admin console (Next.js standalone)
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Proprietary

      - name: build + push
        uses: docker/build-push-action@v7
        with:
          context: ./frontend/admin
          file: ./frontend/admin/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scoped buildx cache so frontend and platform don't trample
          # each other's layers in GHA cache storage.
          cache-from: type=gha,scope=admin-frontend
          cache-to: type=gha,scope=admin-frontend,mode=max

      - name: publish image summary
        run: |
          {
            echo "### Published frontend image"
            echo ""
            echo "**Tags:**"
            echo "${{ steps.meta.outputs.tags }}" | sed 's/^/- `/' | sed 's/$/`/'
            echo ""
            echo "**Pull:**"
            echo '```'
            echo "docker pull ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
