# Production profile reads everything from environment variables.
# No secrets in the repo.
spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:?MONGODB_URI must be set in production}
    redis:
      url: ${REDIS_URL:?REDIS_URL must be set in production}
  # SMTP is optional. If SMTP_HOST is unset/empty the app still boots —
  # invite + password-reset emails fall back to NoOpEmailService (logs the
  # message instead of sending). Feature endpoints stay functional.
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          starttls:
            enable: true

server:
  forward-headers-strategy: framework

management:
  endpoint:
    health:
      show-details: never
  health:
    # SMTP is non-critical infrastructure. Spring's default MailHealthIndicator
    # opens a Transport.connect() against the SMTP server on every /actuator/health
    # call; a flaky or unconfigured relay would flip the aggregate to DOWN and
    # take the platform out of Traefik's load-balancer rotation. Send-time
    # failures are already logged-and-continued by AuthService / TenantUsersService
    # / OperatorsAdminService, so excluding SMTP from health is intentional.
    mail:
      enabled: false

logging:
  level:
    root: INFO
    com.orochiverse.platform: INFO

# Phase 1.5: JWT keys MUST be loaded from disk in production. Failing fast
# here is the point — we never want to mint tokens with an ephemeral key
# in prod and then have nothing else trust them.
platform:
  security:
    jwt:
      issuer: ${PLATFORM_JWT_ISSUER:?PLATFORM_JWT_ISSUER must be set in production}
      private-key-path: ${PLATFORM_JWT_PRIVATE_KEY_PATH:?PLATFORM_JWT_PRIVATE_KEY_PATH must be set in production}
      public-key-path: ${PLATFORM_JWT_PUBLIC_KEY_PATH:?PLATFORM_JWT_PUBLIC_KEY_PATH must be set in production}
      key-id: ${PLATFORM_JWT_KEY_ID:?PLATFORM_JWT_KEY_ID must be set in production}
  email:
    from: ${PLATFORM_EMAIL_FROM:?PLATFORM_EMAIL_FROM must be set in production}
    reply-to: ${PLATFORM_EMAIL_REPLY_TO:}
    base-url: ${PLATFORM_EMAIL_BASE_URL:?PLATFORM_EMAIL_BASE_URL must be set in production}
