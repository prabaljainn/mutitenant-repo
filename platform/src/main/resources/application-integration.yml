# Profile used by integration tests against the local dev Mongo stack
# (started by scripts/dev-up.sh). Mongo URI is set per-test via
# @DynamicPropertySource so each test can target its own DB name without
# stomping on data.
spring:
  autoconfigure:
    exclude:
      # Mongo IS enabled here. Redis and Mail stay excluded — tests that
      # need them (Phase 1.5+) will pull them in explicitly.
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

logging:
  level:
    root: WARN
    com.orochiverse.platform: INFO
    org.mongodb.driver: WARN
